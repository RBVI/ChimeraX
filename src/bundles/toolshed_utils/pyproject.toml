[project]
name="ChimeraX-ToolshedUtils"
version="1.2.1"  # PEP 440, should match Development Status below
description="Toolshed bundle utilities"  # one line synopsis
readme="README.txt" # maps to long_description
authors = [{name = "UCSF RBVI", email = "chimerax@cgl.ucsf.edu"}]
requires-python = ">=3.7"
dependencies = [
    "wheel_filename~=1.2"
]
classifiers=[
    # From https://pypi.python.org/pypi?%3Aaction=list_classifiers
    # and our own ChimeraX classifiers.
    "Development Status :: 5 - Stable",
    "Environment :: MacOS X :: Aqua",
    "Environment :: Win32 (MS Windows)",
    "Environment :: X11 Applications",
    "Framework :: ChimeraX",
    "Intended Audience :: Science/Research",
    "License :: Free for non-commercial use",
    "Operating System :: MacOS :: MacOS X",
    "Operating System :: Microsoft :: Windows :: Windows 10",
    "Operating System :: POSIX :: Linux",
    "Programming Language :: Python :: 3",
    "Topic :: Scientific/Engineering :: Visualization",
    "Topic :: Scientific/Engineering :: Chemistry",
    "Topic :: Scientific/Engineering :: Bio-Informatics",
    "ChimeraX :: Bundle :: Utilities :: 1,1 :: chimerax.toolshed_utils ::  :: true",
    "ChimeraX :: Tool :: Updates :: Utilities :: synopsis",
]

[project.urls]
Home = "https://www.rbvi.ucsf.edu/chimerax/"

[tool.setuptools]
packages = [
    "chimerax.toolshed_utils"
]

[tool.setuptools.package-dir]
"chimerax.toolshed_utils" = "src" # directory package's source files are in

[tool.setuptools.package-data]
"chimerax.toolshed_utils" = ["docs/user/tools/*"]
